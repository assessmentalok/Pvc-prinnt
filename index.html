<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agristack Farmer Card Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">

<h2>Farmer Card Generator</h2>

<input id="fname" placeholder="Farmer Name">
<input id="father" placeholder="Father Name">
<input id="dob" type="date">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="caste" placeholder="Caste">
<input id="mobile" placeholder="Mobile">
<input id="category" placeholder="Category">

<input id="enrollment" placeholder="Enrollment No">
<input id="farmerid" placeholder="Farmer ID">

<textarea id="address" placeholder="Address"></textarea>

<input id="district" placeholder="District">
<input id="tehsil" placeholder="Tehsil">
<input id="village" placeholder="Village">
<input id="gata" placeholder="Gata Number">

<input type="file" id="photo">

<button onclick="generateCard()">Generate Card</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="card">

<!-- FRONT -->

<div class="card">

<div class="header">

<div class="logoBox">
<img src="up-logo.png">
<div>
उत्तर प्रदेश सरकार<br>
Govt. of UP
</div>
</div>

<div class="logoBox">
<img src="agristack-logo.png">
</div>

</div>

<div class="frontBody">

<img id="previewPhoto" class="photo">

<div class="info">

<h3 id="showName"></h3>
<p id="showFather"></p>
<p id="showDob"></p>
<p id="showGender"></p>

<div class="highlight">
<p id="showEnrollment"></p>
<p id="showFarmerId"></p>
</div>

</div>

</div>

<div class="footer">
<span id="showMobile"></span>
<span id="showCategory"></span>
</div>

</div>

<!-- BACK -->

<div class="card">

<div class="backHeader">
भूमि एवं आवासीय विवरण
</div>

<div class="backBody">

<p id="showAddress"></p>

<p id="showLand"></p>

<p id="showGata"></p>

<div class="bottomRow">

<div id="qrcode"></div>

<div class="note">
यह कार्ड एग्रीस्टैक डिजिटल पब्लिक इन्फ्रास्ट्रक्चर के तहत प्रमाणित है।
</div>

</div>

</div>

<div class="footer">
जारी तिथि: 13/02/2025 | DBT Eligible
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
